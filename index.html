<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0E17" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="description"
      content="Milad Ateight (AT8): IT specialist working across network infrastructure, MikroTik, Linux and Windows servers, web and mail systems, DevOps, and tooling."
    />
    <title>Milad Ateight | AT8 Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
    />
    <style>
      .loader-root {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #030712;
        color: #94a3b8;
        font-family: 'Space Grotesk', sans-serif;
        z-index: 9999;
      }
      .loader-logo {
        width: 64px; height: 64px;
        position: relative;
        margin-bottom: 32px;
      }
      .loader-logo-inner {
        position: absolute; inset: 4px;
        border: 2px solid rgba(34,211,148,0.3);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 700;
        color: #22d394;
        letter-spacing: -0.02em;
        animation: pulse-glow 1.8s ease-in-out infinite;
      }
      .loader-ring {
        position: absolute; inset: -8px;
        border-radius: 28px;
        border: 1px solid transparent;
        border-top-color: rgba(34,211,148,0.5);
        border-right-color: rgba(34,211,148,0.15);
        animation: spin-ring 1.2s linear infinite;
      }
      .loader-ring-2 {
        position: absolute; inset: -16px;
        border-radius: 34px;
        border: 1px solid transparent;
        border-bottom-color: rgba(34,211,148,0.3);
        border-left-color: rgba(34,211,148,0.1);
        animation: spin-ring-reverse 1.8s linear infinite;
      }
      .loader-dots {
        display: flex; gap: 8px; margin-bottom: 20px;
      }
      .loader-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #22d394;
        animation: dot-bounce 1.4s ease-in-out infinite;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      .loader-text {
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        opacity: 0.6;
        animation: text-fade 2s ease-in-out infinite;
      }
      @keyframes spin-ring { to { transform: rotate(360deg); } }
      @keyframes spin-ring-reverse { to { transform: rotate(-360deg); } }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(34,211,148,0.1); }
        50% { box-shadow: 0 0 40px rgba(34,211,148,0.25); }
      }
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
      @keyframes text-fade {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-root">
        <div class="loader-logo">
          <div class="loader-ring" />
          <div class="loader-ring-2" />
          <div class="loader-logo-inner">AT8</div>
        </div>
        <div class="loader-dots">
          <div class="loader-dot" />
          <div class="loader-dot" />
          <div class="loader-dot" />
        </div>
        <div class="loader-text">Loading</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
