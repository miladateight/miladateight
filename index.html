    <style>
      .loader-root {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #06080d;
        color: #6b7a96;
        font-family: 'Space Grotesk', sans-serif;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      .loader-root.fade-out { opacity: 0; pointer-events: none; }
      .loader-mark {
        width: 64px; height: 64px;
        display: grid; place-items: center;
        border-radius: 50%;
        background: linear-gradient(135deg, #38bdf8, #8b5cf6);
        color: #fff;
        font-family: 'Fira Code', monospace;
        font-size: 18px; font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 28px;
        box-shadow: 0 0 40px rgba(56,189,248,0.2);
        animation: loaderBreathe 2s ease-in-out infinite;
      }
      @keyframes loaderBreathe {
        0%, 100% { transform: scale(0.95); opacity: 0.7; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      .loader-bar {
        width: 100px; height: 2px;
        background: rgba(56,189,248,0.1);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .loader-bar-fill {
        height: 100%; width: 30%;
        background: linear-gradient(90deg, transparent, #38bdf8, transparent);
        border-radius: 2px;
        animation: loaderSweep 1.4s ease-in-out infinite;
      }
      @keyframes loaderSweep {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
      .loader-text {
        font-size: 11px; letter-spacing: 0.15em;
        text-transform: uppercase; opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-root" id="loader">
        <div class="loader-mark">AT8</div>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
        <div class="loader-text">Loading</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
