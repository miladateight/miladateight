    <style>
      .loader-root {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #06080d;
        color: #8fa1c7;
        font-family: ui-sans-serif, system-ui, sans-serif;
        z-index: 9999;
        transition: opacity 0.35s ease;
      }
      .loader-mark {
        width: 64px; height: 64px;
        display: grid; place-items: center;
        border-radius: 18px;
        background:
          linear-gradient(135deg, rgba(56, 189, 248, 0.95), rgba(139, 92, 246, 0.9)),
          #0c1018;
        color: #ffffff;
        font-family: ui-monospace, "Cascadia Code", monospace;
        font-size: 18px; font-weight: 800;
        letter-spacing: 0;
        margin-bottom: 28px;
        box-shadow: 0 0 42px rgba(56, 189, 248, 0.24);
        animation: loaderBreathe 2s ease-in-out infinite;
      }
      @keyframes loaderBreathe {
        0%, 100% { transform: scale(0.96); opacity: 0.74; }
        50% { transform: scale(1.04); opacity: 1; }
      }
      .loader-bar {
        width: 112px; height: 2px;
        background: rgba(56, 189, 248, 0.12);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 14px;
      }
      .loader-bar-fill {
        height: 100%; width: 34%;
        background: linear-gradient(90deg, transparent, #38bdf8, transparent);
        border-radius: 2px;
        animation: loaderSweep 1.35s ease-in-out infinite;
      }
      @keyframes loaderSweep {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(360%); }
      }
      .loader-text {
        font-size: 11px; letter-spacing: 0.12em;
        text-transform: uppercase; opacity: 0.58;
      }
      @media (prefers-reduced-motion: reduce) {
        .loader-mark, .loader-bar-fill { animation: none; }
      }
      .loader-root.is-timeout {
        background: #080d15;
      }
      .loader-root.is-timeout .loader-text {
        max-width: 280px;
        color: #dbeafe;
        line-height: 1.6;
        letter-spacing: 0;
        text-align: center;
        text-transform: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-root" id="loader">
        <div class="loader-mark">AT8</div>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
        <div class="loader-text">Loading</div>
      </div>
    </div>
    <script>
      window.setTimeout(function () {
        var loader = document.getElementById("loader");
        if (!loader) return;
        loader.classList.add("is-timeout");
        var text = loader.querySelector(".loader-text");
        if (text) text.textContent = "Still loading. If this does not change, use the navigation after refreshing the page.";
      }, 5000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
