name: Deploy static portfolio to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir _site
          cp index.html _site/index.html
          cp CNAME _site/CNAME
          cp .nojekyll _site/.nojekyll
          cp -R assets _site/assets
          cp favicon.png _site/favicon.png
          cp apple-touch-icon.png _site/apple-touch-icon.png
          cp at8-logo.png _site/at8-logo.png
          cp at8-kit.css _site/at8-kit.css
          cp at8-kit.js _site/at8-kit.js

      - name: Fetch project pages from their own repos
        run: |
          set -euo pipefail
          fetch_project () {
            local repo="$1"
            local dir="$2"
            mkdir -p "_site/$dir"
            curl -fsSL "https://raw.githubusercontent.com/miladateight/$repo/main/index.html" -o "_site/$dir/index.html"
            curl -fsSL "https://raw.githubusercontent.com/miladateight/$repo/main/at8-logo.png" -o "_site/$dir/at8-logo.png"
          }
          fetch_project "NetDoctor" "NetDoctor"
          fetch_project "KeyFix" "KeyFix"
          fetch_project "hybrid-web-mail-infrastructure" "hybrid-web-mail-infrastructure"
          fetch_project "instagram-youtube-soundcloud-downloader" "instagram-youtube-soundcloud-downloader"

          mkdir -p "_site/NetDoctor/assets/screenshots"
          for shot in start.png dashboard.png start-iran.png dashboard-iran.png; do
            curl -fsSL "https://raw.githubusercontent.com/miladateight/NetDoctor/main/assets/screenshots/$shot" \
              -o "_site/NetDoctor/assets/screenshots/$shot"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
